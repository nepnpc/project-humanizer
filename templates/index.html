<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Humanizer — llama-3.3-70b</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0f14;
      --surface:    #161b24;
      --surface2:   #1e2533;
      --border:     #2a3244;
      --accent:     #5c8aff;
      --accent-dim: #3a5bbf;
      --text:       #d4daf0;
      --text-muted: #6b7897;
      --success:    #3ecf8e;
      --danger:     #ff5c72;
      --radius:     10px;
      --font:       'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 680px;
      width: 100%;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #d4daf0 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    /* ── Main card ─────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      width: 100%;
      max-width: 820px;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* ── Form controls ─────────────────────────────────────────────────── */
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      line-height: 1.65;
      padding: 0.9rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    textarea[readonly] {
      cursor: default;
    }

    /* ── Options row ───────────────────────────────────────────────────── */
    .options-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="number"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      padding: 0.55rem 0.85rem;
      width: 130px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
    }

    /* ── Submit button ─────────────────────────────────────────────────── */
    #submitBtn {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      padding: 0.65rem 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #submitBtn:hover:not(:disabled) { background: var(--accent-dim); }
    #submitBtn:active:not(:disabled) { transform: scale(0.97); }
    #submitBtn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Spinner ───────────────────────────────────────────────────────── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Word-count badge ──────────────────────────────────────────────── */
    .wc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .badge {
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: background 0.3s, color 0.3s;
    }

    .badge.success {
      background: rgba(62,207,142,0.12);
      border-color: var(--success);
      color: var(--success);
    }

    /* ── Stats strip ───────────────────────────────────────────────────── */
    .stats-strip {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.danger { color: var(--danger); }

    /* ── Copy button ───────────────────────────────────────────────────── */
    #copyBtn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #copyBtn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Error message ─────────────────────────────────────────────────── */
    #errorMsg {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.6rem;
      display: none;
    }

    /* ── Output card hidden by default ────────────────────────────────── */
    #outputCard { display: none; }

    /* ── Divider ───────────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .card { padding: 1.25rem 1rem; }
      #submitBtn { margin-left: 0; width: 100%; justify-content: center; }
      .options-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-row">
      <div class="logo-icon">&#9997;</div>
      <h1>Project Humanizer</h1>
    </div>
    <p class="subtitle">Rewrites AI-generated text into natural university student report style — Llama 3.3 70B.</p>
  </header>

  <!-- ── Input card ─────────────────────────────────────────────────────── -->
  <div class="card">
    <p class="card-title">Input Text</p>
    <textarea
      id="inputText"
      rows="10"
      placeholder="Paste your AI-generated report text here. Paragraph breaks are preserved — paste the full section or report body…"
    ></textarea>

    <div class="options-row">
      <div class="field-group">
        <label for="wordLimit">Max word limit</label>
        <input type="number" id="wordLimit" value="400" min="10" max="5000" />
      </div>

      <button id="submitBtn" onclick="humanize()">
        <div class="spinner" id="spinner"></div>
        <span id="btnLabel">Humanize</span>
      </button>
    </div>

    <p id="errorMsg"></p>
  </div>

  <!-- ── Output card ────────────────────────────────────────────────────── -->
  <div class="card" id="outputCard">
    <div class="stats-strip" id="statsStrip"></div>
    <hr class="divider" />

    <div class="wc-row">
      <p class="card-title" style="margin-bottom:0">Humanized Output</p>
      <div style="display:flex;align-items:center;gap:0.6rem;">
        <span class="badge success" id="wcBadge"></span>
        <button id="copyBtn" onclick="copyOutput()">Copy</button>
      </div>
    </div>

    <textarea id="outputText" rows="12" readonly></textarea>
  </div>

  <script>
    async function humanize() {
      const rawText = document.getElementById('inputText').value.trim();
      const wordLimit = parseInt(document.getElementById('wordLimit').value, 10);
      const errorMsg = document.getElementById('errorMsg');
      const outputCard = document.getElementById('outputCard');

      // Reset state
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      outputCard.style.display = 'none';

      if (!rawText) {
        showError('Please enter some text before submitting.');
        return;
      }
      if (!wordLimit || wordLimit < 10) {
        showError('Please set a word limit of at least 10.');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/humanize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ raw_text: rawText, target_word_limit: wordLimit }),
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || `Server error: ${response.status}`);
          return;
        }

        renderOutput(data, wordLimit);

      } catch (err) {
        showError('Could not reach the backend. Is the FastAPI server running?');
      } finally {
        setLoading(false);
      }
    }

    function renderOutput(data, wordLimit) {
      const outputCard = document.getElementById('outputCard');
      const outputText = document.getElementById('outputText');
      const wcBadge = document.getElementById('wcBadge');
      const statsStrip = document.getElementById('statsStrip');

      outputText.value = data.humanized_text;
      wcBadge.textContent = `${data.final_count} words`;

      const delta = data.original_count - data.final_count;
      const deltaLabel = delta >= 0
        ? `&#8209;${delta} words trimmed`
        : `+${Math.abs(delta)} words added`;

      // Academic writing naturally has lower sentence-length variation than casual prose.
      // Good academic burstiness: CV ≥ 0.35 | Fair: ≥ 0.22 | Low: < 0.22
      const bScore = data.burstiness_score ?? 0;
      const bClass = bScore >= 0.35 ? 'success' : bScore >= 0.22 ? 'accent' : 'danger';
      const bLabel = bScore >= 0.35 ? 'Good' : bScore >= 0.22 ? 'Fair' : 'Low';

      statsStrip.innerHTML = `
        <div class="stat">
          <span class="stat-label">Original</span>
          <span class="stat-value">${data.original_count}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Final</span>
          <span class="stat-value success">${data.final_count}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Limit</span>
          <span class="stat-value accent">${wordLimit}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Delta</span>
          <span class="stat-value">${deltaLabel}</span>
        </div>
        <div class="stat">
          <span class="stat-label">Burstiness</span>
          <span class="stat-value ${bClass}">${bScore} <small style="font-size:0.65rem;font-weight:400">(${bLabel})</small></span>
        </div>
        ${data.polish_applied ? `<div class="stat"><span class="stat-label">Pass</span><span class="stat-value accent">2×</span></div>` : ''}
      `;

      outputCard.style.display = 'block';
      outputCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function setLoading(on) {
      const btn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      const label = document.getElementById('btnLabel');

      btn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      label.textContent = on ? 'Processing…' : 'Humanize';
    }

    function copyOutput() {
      const text = document.getElementById('outputText').value;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1800);
      });
    }

    // Allow Ctrl/Cmd+Enter to submit
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') humanize();
    });
  </script>

</body>
</html>
